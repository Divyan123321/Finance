{% extends "layout.html" %}

{% block title %}Register-finance{% endblock %}

{% block content %}
<h2>Welcome to the registration lobby</h2>
<p>Please regsiter your username and password here</p>
<form method="post">
    <input name="username" type="text" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <input name="confirmation" type="password" placeholder="Confirm Password" required>
    <button type="submit">Register</button>
</form>
{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
{% endblock %}
